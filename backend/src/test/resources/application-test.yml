# ============================================================================
# 测试环境配置 (test) - H2 内存数据库
# ============================================================================

spring:
  # 数据源配置 - H2 内存数据库
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA/Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: none  # 使用 Flyway 迁移
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-on-validation-error: true

  # H2 控制台
  h2:
    console:
      enabled: true
      path: /h2-console

# 服务器配置
server:
  port: 0  # 随机可用端口
  ssl:
    enabled: false

# 日志级别
logging:
  level:
    root: WARN
    com.usermanagement: DEBUG
    org.springframework: WARN
    org.hibernate: WARN

# JWT 配置 (测试用)
app:
  jwt:
    secret: test-secret-key-for-testing-only-12345678901234567890
    expiration: 3600000
    refresh-expiration: 86400000
    issuer: usermanagement-test

# 密码策略 (测试用)
app:
  password:
    min-length: 6
    require-uppercase: false
    require-lowercase: false
    require-digit: false
    require-special: false

# 账户锁定配置 (测试用)
app:
  account:
    lockout:
      threshold: 100
      duration: 60
