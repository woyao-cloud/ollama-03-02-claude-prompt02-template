# ============================================================================
# 测试环境配置 (test)
# ============================================================================

spring:
  # 数据源配置 - Testcontainers PostgreSQL
  datasource:
    url: jdbc:tc:postgresql:15://localhost/testdb
    driver-class-name: org.testcontainers.jdbc.PostgresqlDriver
    username: test
    password: test
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000

  # JPA/Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # Flyway 配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-on-validation-error: true

  # 测试配置
  config:
    import: optional:file:.env[.properties]

# 虚拟线程
spring:
  threads:
    virtual:
      enabled: true

# 服务器配置
server:
  port: 0  # 随机可用端口
  ssl:
    enabled: false

# 日志级别
logging:
  level:
    root: WARN
    com.usermanagement: INFO
    org.springframework.security: WARN

# JWT 配置 (测试用)
app:
  jwt:
    secret: test-secret-key-for-testing-only
    expiration: 3600000        # 1 小时
    refresh-expiration: 86400000  # 24 小时
    issuer: usermanagement-test

# 密码策略 (测试用)
app:
  password:
    min-length: 6
    require-uppercase: false
    require-lowercase: false
    require-digit: false
    require-special: false

# 账户锁定配置 (测试用 - 放宽)
app:
  account:
    lockout:
      threshold: 100
      duration: 60
