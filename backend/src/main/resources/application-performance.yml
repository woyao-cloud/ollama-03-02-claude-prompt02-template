# ============================================================================
# 性能优化配置文件
# 用于 B15 性能优化阶段
# ============================================================================

# HikariCP 连接池优化配置
spring:
  datasource:
    hikari:
      # 最大连接数 - 根据数据库实例数调整 (CPU 核心数 * 2 + 1)
      maximum-pool-size: 50
      # 最小空闲连接数
      minimum-idle: 20
      # 连接超时时间 (毫秒)
      connection-timeout: 20000
      # 空闲连接超时时间 (毫秒)
      idle-timeout: 300000
      # 连接最大生命周期 (毫秒)
      max-lifetime: 1200000
      # 连接测试查询
      connection-test-query: SELECT 1
      # 启用泄漏检测 (毫秒) - 检测连接泄漏
      leak-detection-threshold: 60000
      # 初始化失败后继续启动
      initialization-fail-timeout: -1
      # 指标注册
      register-mbeans: true

  # Redis 连接池优化
  data:
    redis:
      timeout: 2000ms
      lettuce:
        pool:
          # 最大连接数
          max-active: 50
          # 最大空闲连接
          max-idle: 20
          # 最小空闲连接
          min-idle: 10
          # 获取连接最大等待时间 (-1 表示无限等待)
          max-wait: 3000ms
        # 启用集群拓扑刷新
        cluster:
          refresh:
            adaptive: true
            period: 60000

# 虚拟线程启用 (JDK 21+)
spring:
  threads:
    virtual:
      enabled: true

# Tomcat 服务器优化
server:
  tomcat:
    # 最大连接数
    max-connections: 10000
    # 最大工作线程数
    threads:
      max: 200
      min-spare: 25
    # 等待队列长度
    accept-count: 100
    # 连接超时 (毫秒)
    connection-timeout: 20000
    # 最大请求头大小
    max-http-form-post-size: 2MB
    # 启用 HTTP/2
    protocol: org.apache.coyote.http11.Http11Nio2Protocol

  # HTTP 压缩
  compression:
    enabled: true
    # 最小响应大小 (字节)
    min-response-size: 1024
    # 压缩 MIME 类型
    mime-types: application/json,text/html,text/xml,text/plain,text/css,application/javascript

# JVM G1GC 参数 (通过 JAVA_OPTS 设置，此处记录配置)
# JAVA_OPTS="-XX:+UseG1GC -XX:MaxGCPauseMillis=100 -XX:G1HeapRegionSize=16m -XX:InitiatingHeapOccupancyPercent=45 -XX:MaxMetaspaceSize=512m -XX:+UseStringDeduplication -XX:G1ReservePercent=10 -XX:G1NewSizePercent=40 -XX:G1MaxNewSizePercent=50"

# JWT 优化配置
app:
  jwt:
    # 使用 HS512 算法 (更快的签名)
    algorithm: HS512
    # Access Token 过期时间 (毫秒) - 1 小时
    expiration: 3600000
    # Refresh Token 过期时间 (毫秒) - 7 天
    refresh-expiration: 604800000
    # Token 刷新缓冲时间 (毫秒) - 提前 5 分钟刷新
    refresh-buffer: 300000

# 缓存优化配置
cache:
  # Caffeine 本地缓存配置
  caffeine:
    # 最大缓存数量
    max-size: 10000
    # 默认过期时间 (秒)
    default-expiration: 300
    # 写入后过期时间 (秒)
    expire-after-write: 300
    # 访问后过期时间 (秒)
    expire-after-access: 180

  # 部门树缓存
  department:
    tree:
      # 缓存过期时间 (秒)
      expiration: 1800
      # 空值缓存过期时间 (秒) - 防止缓存穿透
      null-expiration: 300
      # 最大缓存深度
      max-depth: 10

  # 用户权限缓存
  user:
    permissions:
      # 缓存过期时间 (秒)
      expiration: 600
      # 最大缓存数量
      max-size: 5000

# 异步配置
async:
  # 线程池配置
  executor:
    # 核心线程数
    core-pool-size: 20
    # 最大线程数
    max-pool-size: 100
    # 队列容量
    queue-capacity: 1000
    # 线程存活时间 (秒)
    keep-alive: 60
    # 线程名前缀
    thread-name-prefix: async-

# 审计日志异步配置
audit:
  # 异步写入配置
  async:
    # 是否启用异步
    enabled: true
    # 批量写入大小
    batch-size: 100
    # 批量写入间隔 (毫秒)
    batch-interval: 1000
    # 队列容量
    queue-capacity: 5000

# 数据库查询优化
jpa:
  # 批量操作大小
  batch-size: 50
  # 启用排序插入/更新
  order-inserts: true
  order-updates: true
  # 禁用 Open-In-View
  open-in-view: false
  # JDBC 获取大小
  properties:
    hibernate:
      jdbc:
        batch_size: 50
        batch_versioned_data: true
      # 语句缓存
      query:
        plan_cache_max_size: 2048
        plan_parameter_metadata_cache_size: 512

# 监控指标
management:
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
